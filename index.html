<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Maneuver Simulator</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #8DB2D6; touch-action: none; font-family: sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; font-size: 30px; color: black; text-align: center; line-height: 30px; font-weight: 100; }

        .touch-btn { pointer-events: auto; user-select: none; background: rgba(255, 255, 255, 0.8); border-radius: 15px; font-weight: bold; font-size: 24px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .touch-btn:active { background: rgba(200, 200, 200, 0.9); transform: scale(0.95); }

        /* UI全体を上に持ち上げて見切れを防止 */
        .dpad { position: absolute; bottom: 80px; left: 20px; width: 160px; height: 160px; }
        .btn-up { position: absolute; top: 0; left: 55px; width: 50px; height: 50px; }
        .btn-down { position: absolute; bottom: 0; left: 55px; width: 50px; height: 50px; }
        .btn-left { position: absolute; top: 55px; left: 0; width: 50px; height: 50px; }
        .btn-right { position: absolute; top: 55px; right: 0; width: 50px; height: 50px; }

        .actions { position: absolute; bottom: 80px; right: 20px; width: 150px; height: 150px; }
        .btn-a { position: absolute; top: 10px; right: 10px; width: 65px; height: 65px; border-radius: 50%; }
        .btn-b { position: absolute; bottom: 10px; left: 10px; width: 65px; height: 65px; border-radius: 50%; }

        #loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #222; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; }
        #error-log { color: #ff6b6b; font-size: 14px; max-width: 80%; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="canvas-container"></div>
        <div id="ui-layer">
            <div class="crosshair">＋</div>
            <div class="dpad">
                <div id="btn-up" class="touch-btn btn-up">↑</div>
                <div id="btn-down" class="touch-btn btn-down">↓</div>
                <div id="btn-left" class="touch-btn btn-left">←</div>
                <div id="btn-right" class="touch-btn btn-right">→</div>
            </div>
            <div class="actions">
                <div id="btn-a" class="touch-btn btn-a">A</div>
                <div id="btn-b" class="touch-btn btn-b">B</div>
            </div>
        </div>
        <div id="loading">
            <div id="loading-text">読み込み中...</div>
            <div id="error-log"></div>
        </div>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
