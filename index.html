<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Maneuver Simulator</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #8DB2D6; touch-action: none; font-family: sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* UI全体レイヤー */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* 中央の照準 */
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 30px; color: black; font-weight: 100; pointer-events: none; }

        /* 左上ボタン群 */
        .top-left-btns { position: absolute; top: 15px; left: 15px; display: flex; gap: 10px; pointer-events: auto; }
        .top-btn { background: rgba(255, 255, 255, 0.9); border: none; border-radius: 10px; padding: 10px 15px; font-weight: bold; color: #3498db; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }

        /* 右上デバッグパネル */
        .debug-panel { position: absolute; top: 15px; right: 15px; background: rgba(60, 80, 90, 0.8); color: white; padding: 10px 15px; border-radius: 10px; font-size: 13px; text-align: right; line-height: 1.5; pointer-events: none; }
        .debug-panel .green { color: #2ecc71; font-weight: bold; float: left; }

        /* ボタン共通設定 */
        .touch-btn { pointer-events: auto; user-select: none; background: rgba(230, 235, 230, 0.9); display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); font-weight: bold; color: #111; }
        .touch-btn:active { background: rgba(200, 200, 200, 0.9); transform: scale(0.95); }

        /* 左下 十字キー */
        .dpad { position: absolute; bottom: 80px; left: 20px; width: 160px; height: 160px; }
        .dpad-btn { position: absolute; width: 50px; height: 50px; border-radius: 12px; font-size: 24px; }
        .btn-up { top: 0; left: 55px; }
        .btn-down { bottom: 0; left: 55px; }
        .btn-left { top: 55px; left: 0; }
        .btn-right { top: 55px; right: 0; }

        /* 右下 アクションボタン */
        .actions { position: absolute; bottom: 80px; right: 20px; width: 130px; height: 160px; }
        .btn-a { position: absolute; top: 0; right: 0; width: 70px; height: 70px; border-radius: 50%; font-size: 28px; }
        .btn-b { position: absolute; bottom: 0; left: 0; width: 70px; height: 70px; border-radius: 50%; font-size: 28px; }

        /* 下部デバッグバー */
        .bottom-bar { position: absolute; bottom: 15px; left: 15px; right: 15px; background: rgba(40, 40, 40, 0.85); color: #2ecc71; padding: 10px; border-radius: 8px; font-size: 11px; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        .close-btn { background: white; color: black; border-radius: 50%; width: 16px; height: 16px; text-align: center; line-height: 16px; font-size: 10px; font-weight: bold; }

        #loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #222; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; }
        #error-log { color: #ff6b6b; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="canvas-container"></div>
        <div id="ui-layer">
            <div class="top-left-btns">
                <button class="top-btn">MANUAL</button>
                <button class="top-btn">リセット</button>
                <button class="top-btn">リスポーン</button>
            </div>
            <div class="debug-panel">
                T:5.49<br>H:60<br>S:0<br>L:OFF / R:OFF<br>MODEL / GROUND<br><span class="green">DBG</span>
            </div>
            <div class="crosshair">＋</div>
            <div class="dpad">
                <div id="btn-up" class="touch-btn dpad-btn">↑</div>
                <div id="btn-down" class="touch-btn dpad-btn">↓</div>
                <div id="btn-left" class="touch-btn dpad-btn">←</div>
                <div id="btn-right" class="touch-btn dpad-btn">→</div>
            </div>
            <div class="actions">
                <div id="btn-a" class="touch-btn btn-a">A</div>
                <div id="btn-b" class="touch-btn btn-b">B</div>
            </div>
            <div class="bottom-bar">
                <span>P 0.0,60.0,0.0 V 0.0,0.0,0.0 C 0.0,180.0,-230.0 E 0.0,10.0,0.0 W O R O L NA</span>
                <div class="close-btn">✖</div>
            </div>
        </div>
        <div id="loading"><div id="loading-text">読み込み中...</div><div id="error-log"></div></div>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
