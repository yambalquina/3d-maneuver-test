<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Maneuver Gear Sim</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; user-select: none; -webkit-user-select: none; touch-action: none; }
        #canvas-container { position: fixed; inset: 0; width: 100vw; height: 100vh; }
        
        /* 画面中央の照準 */
        .crosshair { position: fixed; left: 50%; top: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); z-index: 10; pointer-events: none; color: white; font-size: 24px; text-shadow: 0 0 4px #000; display: flex; align-items: center; justify-content: center; }

        /* 上部システムUI */
        .top-ui { position: fixed; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 20; pointer-events: none; }
        .system-btns { display: flex; gap: 10px; pointer-events: auto; }
        .btn-small { background: rgba(255,255,255,0.2); border: 1px solid #fff; border-radius: 8px; padding: 8px 12px; color: #fff; font-size: 10px; backdrop-filter: blur(4px); }

        /* ステータス（右上） */
        .status-panel { background: rgba(0,0,0,0.4); color: #0f0; padding: 10px; border-radius: 10px; font-family: monospace; font-size: 12px; text-align: right; pointer-events: none; min-width: 100px; }

        /* メイン操作UI */
        .controls { position: fixed; left: 5vw; right: 5vw; bottom: 50px; display: flex; justify-content: space-between; align-items: flex-end; z-index: 20; pointer-events: none; }
        
        /* 左側：視点操作（D-PAD） */
        .dpad { display: grid; grid-template-columns: repeat(3, 55px); grid-template-rows: repeat(3, 55px); gap: 5px; pointer-events: auto; }
        
        /* 右側：アクション（A/B） */
        .action-btns { display: flex; flex-direction: column; gap: 20px; pointer-events: auto; }
        
        .btn { background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.5); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; backdrop-filter: blur(5px); }
        .btn:active { background: rgba(255,255,255,0.4); transform: scale(0.95); }
        
        .dpad-btn { width: 55px; height: 55px; border-radius: 10px; font-size: 20px; }
        .btn-circle { width: 80px; height: 80px; border-radius: 50%; font-size: 30px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }

        /* メッセージ表示 */
        #msg-box { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); color: white; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 20px; display: none; z-index: 30; }

        #loading { position: fixed; inset: 0; background: #111; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .loader-bar { width: 200px; height: 4px; background: #333; margin-top: 20px; position: relative; }
        .loader-progress { width: 0%; height: 100%; background: #0f0; transition: width 0.3s; }
    </style>
</head>
<body>
    <div id="loading">
        <div id="loading-text">INITIALIZING SYSTEM...</div>
        <div class="loader-bar"><div class="loader-progress" id="progress"></div></div>
    </div>

    <div id="canvas-container"></div>
    <div class="crosshair">＋</div>

    <div class="top-ui">
        <div class="system-btns">
            <button class="btn-small" onclick="location.reload()">RELOAD</button>
            <button class="btn-small" id="btn-reset">RESET</button>
        </div>
        <div class="status-panel" id="hud">
            ALT: 0<br>SPD: 0<br>GAS: 100%
        </div>
    </div>

    <div class="controls">
        <!-- 十字キー：視点操作 -->
        <div class="dpad">
            <div style="grid-column:2"><div class="btn dpad-btn" id="ctrl-up">▲</div></div>
            <div style="grid-column:1; grid-row:2"><div class="btn dpad-btn" id="ctrl-left">◀</div></div>
            <div style="grid-column:3; grid-row:2"><div class="btn dpad-btn" id="ctrl-right">▶</div></div>
            <div style="grid-column:2; grid-row:3"><div class="btn dpad-btn" id="ctrl-down">▼</div></div>
        </div>
        <!-- A/Bボタン：巻き取り / 解放 -->
        <div class="action-btns">
            <div class="btn btn-circle" id="btn-a" style="border-color: #4CAF50;">A</div>
            <div class="btn btn-circle" id="btn-b" style="border-color: #f44336;">B</div>
        </div>
    </div>

    <div id="msg-box"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
