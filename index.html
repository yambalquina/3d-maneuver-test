<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Maneuver Gear - Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #8DB2D6; font-family: sans-serif; user-select: none; -webkit-user-select: none; touch-action: none; }
        #canvas-container { position: fixed; inset: 0; width: 100vw; height: 100vh; }
        
        /* 画面中央の照準 */
        .crosshair { position: fixed; left: 50%; top: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); z-index: 10; pointer-events: none; color: black; font-size: 30px; font-weight: 100; }

        /* 上部ボタン */
        .top-ui { position: fixed; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 20; pointer-events: none; }
        .system-btns { display: flex; gap: 10px; pointer-events: auto; }
        .btn-small { background: rgba(255,255,255,0.9); border: none; border-radius: 8px; padding: 8px 12px; font-weight: bold; color: #3498db; font-size: 12px; }

        /* ステータスパネル */
        .status-panel { background: rgba(0,0,0,0.5); color: white; padding: 10px; border-radius: 10px; font-size: 12px; line-height: 1.4; text-align: right; pointer-events: none; }

        /* 操作UI */
        .controls { position: fixed; left: 5vw; right: 5vw; bottom: 40px; display: flex; justify-content: space-between; align-items: flex-end; z-index: 20; pointer-events: none; }
        .dpad { display: grid; grid-template-columns: repeat(3, 55px); grid-template-rows: repeat(3, 55px); gap: 5px; pointer-events: auto; }
        .action-btns { display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        
        .btn { background: rgba(255,255,255,0.7); border: none; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: #333; box-shadow: 0 4px #ccc; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #999; }
        .btn-circle { width: 75px; height: 75px; border-radius: 50%; font-size: 28px; }

        /* 底部デバッグ */
        .debug-bar { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(0,0,0,0.8); color: #0f0; padding: 5px 10px; font-size: 10px; border-radius: 5px; display: flex; justify-content: space-between; z-index: 25; }

        #loading { position: fixed; inset: 0; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>
    <div id="loading"><div>LOADING 3D ASSETS...</div><div id="error-log"></div></div>
    <div id="canvas-container"></div>
    <div class="crosshair">＋</div>

    <div class="top-ui">
        <div class="system-btns">
            <button class="btn-small" onclick="location.reload()">RESET</button>
            <button class="btn-small">MANUAL</button>
        </div>
        <div class="status-panel" id="hud">
            T: 0.00<br>H: 0<br>S: 0<br>WIRE: OFF
        </div>
    </div>

    <div class="controls">
        <div class="dpad">
            <div style="grid-column:2"><button class="btn" style="width:55px;height:55px;" id="up">↑</button></div>
            <div style="grid-column:1; grid-row:2"><button class="btn" style="width:55px;height:55px;" id="left">←</button></div>
            <div style="grid-column:3; grid-row:2"><button class="btn" style="width:55px;height:55px;" id="right">→</button></div>
            <div style="grid-column:2; grid-row:3"><button class="btn" style="width:55px;height:55px;" id="down">↓</button></div>
        </div>
        <div class="action-btns">
            <button class="btn btn-circle" id="btn-a">A</button>
            <button class="btn btn-circle" id="btn-b">B</button>
        </div>
    </div>

    <div class="debug-bar">
        <span id="debug-text">POS: 0, 0, 0 | VEL: 0</span>
        <span>×</span>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
